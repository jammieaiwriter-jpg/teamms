  <title>小鑽石 Lesson 1 課後複習</title>
  <style>
    :root{
      --ink:#27313f; --muted:#667085; --paper:#fffdf8; --line:#e7e0d2;
      --accent:#207f71; --accent-dark:#145a51; --sky:#dff0ff; --rose:#ffe4ec; --sun:#ffe9a8; --mint:#dff5e7;
    }

    body{
      margin:0; min-height:100vh; color:var(--ink); padding:18px;

    .progress{background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-weight:800;color:var(--accent-dark);}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;}

    .game-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0;}
    button.opt{border:2px solid var(--accent);background:#fff;color:var(--accent-dark);border-radius:12px;padding:14px 18px;font-weight:900;font-size:20px;min-height:54px;cursor:pointer;}
    button.opt:active{background:var(--mint);}
    button.opt.wide{display:block;width:100%;margin:8px 0;font-size:19px;text-align:center;}
    .tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .card{
      border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px 16px 14px;margin-bottom:14px;
    }
    .card .who{font-weight:900;color:var(--accent-dark);font-size:14px;letter-spacing:.04em;}
    .card .en{font-size:clamp(24px,5.5vw,34px);font-weight:900;line-height:1.15;margin:4px 0 2px;}
    .card .zh{color:var(--muted);font-size:15px;margin-bottom:10px;}
    .kk{color:var(--accent-dark);font-weight:700;font-size:16px;}
    .row{display:flex;flex-wrap:wrap;gap:8px;}
    button.act{border:0;border-radius:10px;padding:12px 16px;min-height:50px;font-weight:900;font-size:16px;cursor:pointer;}
    .listen{background:#fff;color:var(--accent-dark);border:2px solid var(--accent);}

    .stop{background:#b54708;color:#fff;}

    .hide{display:none;}

  <div id="panel-vocab" class="hide"></div>
  <div id="panel-grammar" class="hide"></div>

</div>

<script>
/* ===== TEAMMS 小鑽石 Lesson 1 內容（內嵌，不用模組） =====
   主題：Hello! / How are you?　角色：Sam（男）、Ann（女） */
var dialogueLines = [
  {speaker:"Sam", text:"Hello! How are you?", role:"sam", zh:"哈囉！你好嗎？"},
  {speaker:"Ann", text:"I'm great. How about you?", role:"ann", zh:"我很好。你呢？"},
  {speaker:"Sam", text:"I'm fine, thank you. My name is Sam. What's your name?", role:"sam", zh:"我很好，謝謝。我叫 Sam。你叫什麼名字？"},
  {speaker:"Ann", text:"My name is Ann.", role:"ann", zh:"我叫 Ann。"},
];
var vocab = [
  {word:"fine", kk:"[faɪn]", zh:"好的、不錯"},
  {word:"great", kk:"[ɡret]", zh:"很棒"},
  {word:"name", kk:"[nem]", zh:"名字"},
  {word:"thank you", kk:"[θæŋk ju]", zh:"謝謝你"},
  {word:"see you later", kk:"[si ju ˈletɚ]", zh:"待會見"},
  {word:"goodbye", kk:"[ˌɡʊdˈbaɪ]", zh:"再見"},
  {word:"nice to meet you", kk:"[naɪs tu mit ju]", zh:"很高興認識你"},
  {word:"good morning", kk:"[ɡʊd ˈmɔrnɪŋ]", zh:"早安"},
  {word:"good afternoon", kk:"[ɡʊd ˌæftɚˈnun]", zh:"午安"},
  {word:"good evening", kk:"[ɡʊd ˈivnɪŋ]", zh:"晚安（傍晚見面）"},
];
/* 文法：縮寫 I'm = I am，What's = What is（小二只做配對選擇） */
var grammar = {
  rule:"縮寫小魔術：I'm = I am，What's = What is。短短的念起來一樣喔！",
  quiz:[
    {short:"I'm", answer:"I am", full:"I'm fine.", fz:"我很好。"},
    {short:"What's", answer:"What is", full:"What's your name?", fz:"你叫什麼名字？"},
    {short:"I'm", answer:"I am", full:"I'm great.", fz:"我很棒。"},
    {short:"What's", answer:"What is", full:"What's your name?", fz:"你叫什麼名字？"},
  ],
  options:["I am","What is","You are"],
};

/* ===== 評分（內嵌） ===== */
var contractions = {"i'm":"i am","im":"i am","what's":"what is","whats":"what is","don't":"do not","dont":"do not","let's":"let us","lets":"let us"};
function normalizeSpeech(v){
  var s=String(v||"").toLowerCase();
  for(var k in contractions){ s=s.split(k).join(contractions[k]); }
  return s.replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
}
function scoreSpeech(expected, heard){
  var e=normalizeSpeech(expected).split(" ").filter(Boolean);
  var h=normalizeSpeech(heard).split(" ").filter(Boolean);
  if(!h.length) return {stars:0};
  var cur=0, matched=0;
  for(var i=0;i<e.length;i++){ var at=h.indexOf(e[i],cur); if(at!==-1){matched++;cur=at+1;} }
  var coverage=matched/Math.max(e.length,1);
  var penalty=Math.max(h.length-e.length-2,0)*0.04;
  var pct=Math.max(0,Math.min(1,coverage-penalty));
  var stars=Math.ceil(pct*5+0.25);
  if(matched===e.length) stars=5;
  if(matched===0) stars=1;
  if(stars===0&&h.length) stars=1;
  return {stars:stars};
}

/* ===== 星星儲存 ===== */
var SCORE_KEY="teamms-diamond-l1-scores";
function loadScores(){ try{ var a=JSON.parse(localStorage.getItem(SCORE_KEY)||"[]"); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function saveScores(a){ try{ localStorage.setItem(SCORE_KEY, JSON.stringify(a)); }catch(e){} }
var scores = loadScores();
var VOCAB_KEY="teamms-diamond-l1-vocab";
function loadVocab(){ try{ var a=JSON.parse(localStorage.getItem(VOCAB_KEY)||"[]"); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function saveVocab(a){ try{ localStorage.setItem(VOCAB_KEY, JSON.stringify(a)); }catch(e){} }
var vScores = loadVocab();

/* ===== Telegram 過關推播 ===== */
var TG_TOKEN="8737495847:AAF0UODT6S4MLFnPUpx5lnZCaM0iDK5Sefc";
var TG_CHAT="-5062576908";
function notify(msg){
  try{
    fetch("https://api.telegram.org/bot"+TG_TOKEN+"/sendMessage",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:TG_CHAT, text:msg})
    }).catch(function(){});
  }catch(e){}
}
var notified={}; // 同一個分頁裡每種訊息只推一次，避免洗版
function notifyOnce(key,msg){ if(notified[key]) return; notified[key]=true; notify(msg); }

/* ===== 示範語音：只用 speechSynthesis（不用任何 HTML5 Audio） ===== */
var BAD_VOICE=/Fred|Albert|Zarvox|Bad News|Bahh|Bells|Boing|Bubbles|Cellos|Deranged|Good News|Jester|Organ|Superstar|Trinoids|Whisper|Wobble|Grandma|Grandpa|Rocko|Shelley|Sandy|Flo|Eddy|Reed|Rishi/i;
var speakSeq=0;
function pickVoice(role){
  var vs=(window.speechSynthesis&&speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
  var en=vs.filter(function(v){return /en[-_](US|GB|AU)/i.test(v.lang);});
  if(!en.length) return null;
  var good=en.filter(function(v){return !BAD_VOICE.test(v.name);});
  if(!good.length) good=en;
  function best(list){ return list.find(function(v){return /enhanced|premium|siri/i.test(v.name+'|'+(v.voiceURI||''));}) || list[0]; }
  var pref = role==="sam"?["Aaron","Tom","Nathan","Arthur","Daniel","Alex"]
    : ["Samantha","Allison","Ava","Karen","Aaron"]; // ann / together 用女聲
  for(var i=0;i<pref.length;i++){
    var hits=good.filter(function(v){return v.name.indexOf(pref[i])>=0;});
    if(hits.length) return best(hits);
  }
  return best(good);
}
function speak(text, role, onEnd){
  var seq=++speakSeq, done=false;
  function finish(){ if(done || seq!==speakSeq) return; done=true; if(onEnd) onEnd(); }
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.82; u.volume=1;
    u.pitch = role==="sam"?0.85 : 1.08; // Sam 壓低當男孩、Ann 高一點
    var v=pickVoice(role); if(v) u.voice=v;
    if(onEnd){ u.onend=finish; u.onerror=finish; }
    window.speechSynthesis.speak(u);
  }catch(e){ finish(); }
}

/* ===== 語音辨識：1:1 照搬已驗證可用的 rec() ===== */
function SR(){ return window.SpeechRecognition||window.webkitSpeechRecognition; }
var srSupported = !!SR();
function rec(id, cb){
  var C=SR(),
      out=document.getElementById(id+'-out'),
      start=document.getElementById(id+'-start'),
      stop=document.getElementById(id+'-stop');
  if(!C){ if(out) out.textContent='此瀏覽器不支援語音辨識。'; return; }
  var text='', stopped=false, gotAny=false;
  var r=new C();
  r.lang='en-US'; r.continuous=true; r.interimResults=false;
  r.onaudiostart=function(){ if(out) out.textContent='🎙 收音中…請大聲念'; };
  r.onresult=function(e){
    for(var i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) text+=e.results[i][0].transcript+' '; }
    gotAny=true; if(out) out.textContent='👂 聽到：'+(text.trim()||'(空)');
  };
  r.onerror=function(e){ if(out) out.textContent='🔴 辨識問題：'+(e.error||'未知'); };
  r.onend=function(){
    if(!stopped){ setTimeout(function(){ try{r.start();}catch(_){}} ,120); return; }
    if(start) start.disabled=false;
    if(stop) stop.disabled=true;
    if(!gotAny && out) out.textContent='⏹ 沒收到字，再按一次「開始念」。';
    cb(text.trim());
  };
  if(start) start.disabled=true;
  if(stop){ stop.disabled=false; stop.onclick=function(){ stopped=true; try{r.stop();}catch(_){} setTimeout(function(){ try{r.abort();}catch(_){}} ,1200); }; }
  try{ window.speechSynthesis.cancel(); }catch(_){}
  if(out) out.textContent='🎙 啟動中…';
  setTimeout(function(){ try{ r.start(); }catch(e){ if(start) start.disabled=false; if(stop) stop.disabled=true; if(out) out.textContent='請再按一次「開始念」。'; } }, 350);
}

/* ===== 畫面 ===== */
function starStr(n){ var s=''; for(var i=0;i<5;i++) s+= i<n?'⭐':'☆'; return s; }

function updateProgress(){
  var done=dialogueLines.filter(function(_,i){ return (scores[i]||0)>=3; }).length;
  document.getElementById('progress').textContent=done+' / '+dialogueLines.length+' 句';
  if(done===dialogueLines.length) notifyOnce('dialog','🐣 小鑽石 把 Lesson 1 的對話全部念過關了！👏');
}

function buildDialog(){
  var html='';
  dialogueLines.forEach(function(l,i){
    var id='d'+i;
    html+='<div class="card">';
    html+='<div class="who">'+l.speaker+'</div>';
    html+='<div class="en">'+l.text+'</div>';
    html+='<div class="zh">'+l.zh+'</div>';
    html+='<div class="row">';
    html+='<button class="act listen" onclick="speak('+JSON.stringify(l.text).replace(/"/g,'&quot;')+',\''+l.role+'\')">🔊 聽</button>';
    html+='<button class="act start" id="'+id+'-start" onclick="recLine('+i+')">🎤 開始念</button>';
    html+='<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button>';
    html+='</div>';
    html+='<div class="out" id="'+id+'-out"></div>';
    html+='<div class="stars" id="'+id+'-stars">'+starStr(scores[i]||0)+'</div>';
    html+='</div>';
  });
  document.getElementById('panel-dialog').innerHTML=html;
}
function recLine(i){
  rec('d'+i, function(heard){
    if(!heard) return;
    var s=scoreSpeech(dialogueLines[i].text, heard).stars;
    scores[i]=Math.max(scores[i]||0, s);
    saveScores(scores);
    document.getElementById('d'+i+'-stars').textContent=starStr(s);
    document.getElementById('d'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
    updateProgress();
  });
}

function buildVocab(){
  var html='';
  vocab.forEach(function(w,i){
    var id='v'+i;
    html+='<div class="card">';
    html+='<div class="en">'+w.word+' <span class="kk">'+w.kk+'</span></div>';
    html+='<div class="zh">'+w.zh+'</div>';
    html+='<div class="row">';
    html+='<button class="act listen" onclick="speak('+JSON.stringify(w.word).replace(/"/g,'&quot;')+',\'together\')">🔊 聽</button>';
    html+='<button class="act start" id="'+id+'-start" onclick="recVocab('+i+')">🎤 開始念</button>';
    html+='<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button>';
    html+='</div>';
    html+='<div class="out" id="'+id+'-out"></div>';
    html+='<div class="stars" id="'+id+'-stars">'+starStr(vScores[i]||0)+'</div>';
    html+='</div>';
  });
  document.getElementById('panel-vocab').innerHTML=html;
}
function recVocab(i){
  rec('v'+i, function(heard){
    if(!heard) return;
    var s=scoreSpeech(vocab[i].word, heard).stars;
    vScores[i]=Math.max(vScores[i]||0, s);
    saveVocab(vScores);
    document.getElementById('v'+i+'-stars').textContent=starStr(s);
    document.getElementById('v'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
  });
}

/* ===== 小遊戲共用 ===== */
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

/* ===== 單字遊戲：念一個字，點對那個字 ===== */
var wgOrder=[], wgPos=0, wgScore=0;
function wgStart(){
  wgOrder=shuffle(vocab.map(function(_,i){return i;}));
  wgPos=0; wgScore=0;
  wgRender();
}
function wgRender(){
  var p=document.getElementById('panel-wordgame');
  if(wgPos>=wgOrder.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="en">🎉 全部過關！</div><div class="zh">答對 '+wgScore+' / '+wgOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="wgStart()">再玩一次</button></div></div>';
    notifyOnce('wordgame','🐣 小鑽石 完成 Lesson 1 單字遊戲！答對 '+wgScore+' / '+wgOrder.length+' ⭐');
    return;
  }
  var target=wgOrder[wgPos];
  var html='<div class="card" style="text-align:center">';
  html+='<div class="zh">第 '+(wgPos+1)+' / '+wgOrder.length+' 題　答對 '+wgScore+'</div>';
  html+='<div class="en">聽一聽，點出那個字 👂</div>';
  html+='<div class="row" style="justify-content:center"><button class="act listen" onclick="speak('+JSON.stringify(vocab[target].word).replace(/"/g,'&quot;')+',\'together\')">🔊 再聽一次</button></div>';
  html+='<div id="wg-grid" class="game-grid">';
  vocab.forEach(function(w,i){
    html+='<button class="opt" onclick="wgPick('+i+','+target+')">'+w.word+'</button>';
  });
  html+='</div><div class="out" id="wg-out"></div></div>';
  p.innerHTML=html;
  setTimeout(function(){ speak(vocab[target].word,'together'); }, 250);
}
function wgPick(i,target){
  var out=document.getElementById('wg-out');
  if(i===target){
    wgScore++;
    out.textContent='✅ 答對了！'+vocab[target].word;
    wgPos++;
    speak(vocab[target].word,'together', wgRender);
  }else{
    out.textContent='❌ 答錯了，你點的是「'+vocab[i].word+'」，再試試看 🙂';
    speak(vocab[i].word,'together', function(){ speak(vocab[target].word,'together'); });
  }
}

/* ===== 對話遊戲：念一句，選對的回答 ===== */
var talkPairs=[
  {q:"Hello! How are you?", a:"I'm great. How about you?", d:["My name is Ann.","Good evening."]},
  {q:"How are you?", a:"I'm fine, thank you.", d:["See you later.","My name is Sam."]},
  {q:"What's your name?", a:"My name is Ann.", d:["I'm great.","Good morning."]},
  {q:"How about you?", a:"I'm fine, thank you.", d:["Goodbye.","Nice to meet you."]},
];
var tgOrder=[], tgPos=0, tgScore=0;
function tgStart(){ tgOrder=shuffle(talkPairs.map(function(_,i){return i;})); tgPos=0; tgScore=0; tgRender(); }
function tgRender(){
  var p=document.getElementById('panel-talkgame');
  if(tgPos>=tgOrder.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="en">🎉 全部過關！</div><div class="zh">答對 '+tgScore+' / '+tgOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="tgStart()">再玩一次</button></div></div>';
    notifyOnce('talkgame','🐣 小鑽石 完成 Lesson 1 對話遊戲！答對 '+tgScore+' / '+tgOrder.length+' ⭐');
    return;
  }
  var pair=talkPairs[tgOrder[tgPos]];
  var opts=shuffle([pair.a].concat(pair.d));
  var html='<div class="card">';
  html+='<div class="zh" style="text-align:center">第 '+(tgPos+1)+' / '+tgOrder.length+' 題　答對 '+tgScore+'</div>';
  html+='<div class="en" style="text-align:center">'+pair.q+'</div>';
  html+='<div class="row" style="justify-content:center"><button class="act listen" onclick="speak('+JSON.stringify(pair.q).replace(/"/g,'&quot;')+',\'sam\')">🔊 再聽一次</button></div>';
  html+='<div class="zh" style="text-align:center;margin:8px 0">該怎麼回答？👇</div>';
  opts.forEach(function(o){
    html+='<button class="opt wide" onclick="tgPick('+JSON.stringify(o).replace(/"/g,'&quot;')+','+JSON.stringify(pair.a).replace(/"/g,'&quot;')+','+JSON.stringify(pair.q).replace(/"/g,'&quot;')+')">'+o+'</button>';
  });
  html+='<div class="out" id="tg-out"></div></div>';
  p.innerHTML=html;
  setTimeout(function(){ speak(pair.q,'sam'); }, 250);
}
function tgPick(picked, answer, q){
  var out=document.getElementById('tg-out');
  if(picked===answer){
    tgScore++;
    out.textContent='✅ 答對了！';
    tgPos++;
    speak(answer,'ann', tgRender);
  }else{
    out.textContent='❌ 答錯了，你選的是「'+picked+'」，再試試看 🙂';
    speak(picked,'ann', function(){ speak(q,'sam'); });
  }
}

/* ===== 文法（縮寫配對，不用麥克風） ===== */
function buildGrammar(){
  var html='<div class="card"><div class="zh">'+grammar.rule+'</div></div>';
  grammar.quiz.forEach(function(q,i){
    html+='<div class="card">';
    html+='<div class="en">'+q.short+' = ?</div>';
    html+='<div class="zh">例句：'+q.full+'（'+q.fz+'）</div>';
    html+='<div class="row">';
    grammar.options.forEach(function(opt){
      html+='<button class="opt" onclick="grPick('+i+','+JSON.stringify(opt).replace(/"/g,'&quot;')+')">'+opt+'</button>';
    });
    html+='</div><div class="out" id="gr'+i+'-out"></div></div>';
  });
  document.getElementById('panel-grammar').innerHTML=html;
}
function grPick(i,opt){
  var q=grammar.quiz[i], out=document.getElementById('gr'+i+'-out');
  if(opt===q.answer){ out.textContent='✅ 答對了！'+q.short+' = '+q.answer+'　'+q.full; speak(q.full,'ann'); }
  else { out.textContent='❌ 再想想看，'+q.short+' 是哪兩個字？'; }
}

function switchTab(t){
  ['dialog','vocab','grammar','wordgame','talkgame'].forEach(function(name){
    document.getElementById('tab-'+name).classList.toggle('active', t===name);
    document.getElementById('panel-'+name).classList.toggle('hide', t!==name);
  });
  if(t==='wordgame') wgStart();
  if(t==='talkgame') tgStart();
}

buildDialog();
buildVocab();
buildGrammar();
updateProgress();
if(window.speechSynthesis) speechSynthesis.getVoices();
</script>
