<script>
/* ===================================================================
   TEAMMS 貝兒國際美語 · 小鑽石 Lesson 1「Hello! How are you?」
   內容全部來自課本照片：主對話 Sam&Ann、Listen and Do 的 Mary&Tom、
   Conversation Practice 配對、O/X 對錯題、STEM Skill（measure/compare/
   observe/sort＋數名字長度）。
   技術：複習頁只用 speechSynthesis，絕不碰 HTML5 Audio（iOS 麥克風鐵律）。
=================================================================== */

/* ---- 主對話：Sam & Ann（校車站）---- */
var dialogueLines = [
  {speaker:"Sam", text:"Hello! How are you?", role:"sam", zh:"哈囉！你好嗎？"},
  {speaker:"Ann", text:"I'm great. How about you?", role:"ann", zh:"我很好。你呢？"},
  {speaker:"Sam", text:"I'm fine, thank you. My name is Sam. What's your name?", role:"sam", zh:"我很好，謝謝。我叫 Sam。你叫什麼名字？"},
  {speaker:"Ann", text:"My name is Ann.", role:"ann", zh:"我叫 Ann。"},
];
/* ---- 10 個招呼語（每字一個情境圖示）---- */
var vocab = [
  {word:"fine", kk:"[faɪn]", zh:"好的、不錯", emo:"🙂"},
  {word:"great", kk:"[ɡret]", zh:"很棒", emo:"😄"},
  {word:"name", kk:"[nem]", zh:"名字", emo:"🏷️"},
  {word:"thank you", kk:"[θæŋk ju]", zh:"謝謝你", emo:"🙏"},
  {word:"see you later", kk:"[si ju ˈletɚ]", zh:"待會見", emo:"👋"},
  {word:"goodbye", kk:"[ˌɡʊdˈbaɪ]", zh:"再見", emo:"👋"},
  {word:"nice to meet you", kk:"[naɪs tu mit ju]", zh:"很高興認識你", emo:"🤝"},
  {word:"good morning", kk:"[ɡʊd ˈmɔrnɪŋ]", zh:"早安", emo:"🌅"},
  {word:"good afternoon", kk:"[ɡʊd ˌæftɚˈnun]", zh:"午安", emo:"☀️"},
  {word:"good evening", kk:"[ɡʊd ˈivnɪŋ]", zh:"晚安（傍晚）", emo:"🌆"},
];
/* ---- 對話配對（課本 Conversation Practice Part A）---- */
var talkPairs=[
  {q:"What's your name?", a:"My name is Ann.", d:["I'm great.","Good morning."]},
  {q:"How are you?", a:"I'm fine, thank you.", d:["My name is Sam.","See you later."]},
  {q:"Nice to meet you.", a:"Nice to meet you, too.", d:["Goodbye.","I'm great."]},
  {q:"Good afternoon! What's your name?", a:"My name is Tom.", d:["I'm fine.","Thank you."]},
  {q:"Hello! How are you?", a:"I'm great. How about you?", d:["Good evening.","My name is Ann."]},
];
/* ---- 對錯偵探（課本 O/X 題：大小寫 / 標點）---- */
// bad=錯的地方、fixTok=改好的字、correct=正確全句、fix=說明
var checkItems=[
  {text:"how are you?", ok:false, bad:"how", fixTok:"How", correct:"How are you?", fix:"句子開頭第一個字要大寫。"},
  {text:"My name is Sam.", ok:true},
  {text:"My name is tom.", ok:false, bad:"tom", fixTok:"Tom", correct:"My name is Tom.", fix:"人的名字開頭要大寫。"},
  {text:"Good morning.", ok:true},
  {text:"what's your name?", ok:false, bad:"what's", fixTok:"What's", correct:"What's your name?", fix:"句子開頭第一個字要大寫。"},
  {text:"Nice to meet you.", ok:true},
];
/* ---- STEM Skill：科學家動作字（看描述→選對的動作，考理解不只考聽力）---- */
var stemWords=[
  {word:"measure", zh:"測量", emo:"📏", desc:"用尺或迴紋針量量看，看它有多長、多高"},
  {word:"compare", zh:"比較", emo:"⚖️", desc:"把兩個東西放一起，看哪個大、哪個小，比一比"},
  {word:"observe", zh:"觀察", emo:"🔍", desc:"用眼睛或放大鏡仔細看，發現有什麼不一樣"},
  {word:"sort",    zh:"分類", emo:"🗂️", desc:"把一樣的東西放在一起，分成一組一組"},
];
/* ---- STEM Measuring：數名字有幾個字母（課本量名牌活動）---- */
var nameQuiz=[
  {ask:"誰的名字最短？（字母最少）", names:["Tom","Lily","Jean","Anne"], answer:"Tom"},
  {ask:"誰的名字最長？（字母最多）", names:["Tiffany","Jefferson","Nancy","Mary"], answer:"Jefferson"},
];

/* ===== 評分（內嵌） ===== */
var contractions={"i'm":"i am","im":"i am","what's":"what is","whats":"what is","don't":"do not","dont":"do not","let's":"let us","lets":"let us"};
function normalizeSpeech(v){var s=String(v||"").toLowerCase();for(var k in contractions){s=s.split(k).join(contractions[k]);}return s.replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();}
function scoreSpeech(expected,heard){
  var e=normalizeSpeech(expected).split(" ").filter(Boolean);
  var h=normalizeSpeech(heard).split(" ").filter(Boolean);
  if(!h.length) return {stars:0};
  var cur=0,matched=0;
  for(var i=0;i<e.length;i++){var at=h.indexOf(e[i],cur);if(at!==-1){matched++;cur=at+1;}}
  var coverage=matched/Math.max(e.length,1);
  var penalty=Math.max(h.length-e.length-2,0)*0.04;
  var pct=Math.max(0,Math.min(1,coverage-penalty));
  var stars=Math.ceil(pct*5+0.25);
  if(matched===e.length) stars=5;
  if(matched===0) stars=1;
  if(stars===0&&h.length) stars=1;
  return {stars:stars};
}

/* ===== 儲存 ===== */
function lsGet(k,def){ try{ var a=JSON.parse(localStorage.getItem(k)); return a==null?def:a; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
var scores=lsGet("teamms-diamond-l1-scores",[]); if(!Array.isArray(scores))scores=[];
var vScores=lsGet("teamms-diamond-l1-vocab",[]); if(!Array.isArray(vScores))vScores=[];
var cleared=lsGet("teamms-diamond-l1-cleared",{}); if(typeof cleared!=="object"||!cleared)cleared={};

/* ===== Telegram ===== */
var TG_TOKEN="8737495847:AAF0UODT6S4MLFnPUpx5lnZCaM0iDK5Sefc";
var TG_CHAT="-5062576908";
function notify(msg){ try{ fetch("https://api.telegram.org/bot"+TG_TOKEN+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:TG_CHAT,text:msg})}).catch(function(){}); }catch(e){} }
var notified={};
function notifyOnce(key,msg){ if(notified[key])return; notified[key]=true; notify(msg); }

/* ===== 語音（只用 speechSynthesis） ===== */
var BAD_VOICE=/Fred|Albert|Zarvox|Bad News|Bahh|Bells|Boing|Bubbles|Cellos|Deranged|Good News|Jester|Organ|Superstar|Trinoids|Whisper|Wobble|Grandma|Grandpa|Rocko|Shelley|Sandy|Flo|Eddy|Reed|Rishi/i;
var speakSeq=0;
function pickVoice(role){
  var vs=(window.speechSynthesis&&speechSynthesis.getVoices&&speechSynthesis.getVoices())||[];
  var en=vs.filter(function(v){return /en[-_](US|GB|AU)/i.test(v.lang);});
  if(!en.length) return null;
  var good=en.filter(function(v){return !BAD_VOICE.test(v.name);}); if(!good.length) good=en;
  function best(list){ return list.find(function(v){return /enhanced|premium|siri/i.test(v.name+'|'+(v.voiceURI||''));})||list[0]; }
  var pref = role==="sam"?["Aaron","Tom","Nathan","Arthur","Daniel","Alex"]:["Samantha","Allison","Ava","Karen","Aaron"];
  for(var i=0;i<pref.length;i++){ var hits=good.filter(function(v){return v.name.indexOf(pref[i])>=0;}); if(hits.length) return best(hits); }
  return best(good);
}
function speak(text,role,onEnd){
  var seq=++speakSeq,done=false;
  function finish(){ if(done||seq!==speakSeq)return; done=true; if(onEnd)onEnd(); }
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.82; u.volume=1; u.pitch=role==="sam"?0.85:1.08;
    var v=pickVoice(role); if(v)u.voice=v;
    if(onEnd){ u.onend=finish; u.onerror=finish; }
    window.speechSynthesis.speak(u);
  }catch(e){ finish(); }
}

/* ===== 辨識（1:1 照搬已驗證可用版） ===== */
function SR(){ return window.SpeechRecognition||window.webkitSpeechRecognition; }
var srSupported=!!SR();
function rec(id,cb){
  var C=SR(),out=document.getElementById(id+'-out'),start=document.getElementById(id+'-start'),stop=document.getElementById(id+'-stop');
  if(!C){ if(out)out.textContent='此瀏覽器不支援語音辨識。'; return; }
  var text='',stopped=false,gotAny=false;
  var r=new C(); r.lang='en-US'; r.continuous=true; r.interimResults=false;
  r.onaudiostart=function(){ if(out)out.textContent='🎙 收音中…請大聲念'; };
  r.onresult=function(e){ for(var i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) text+=e.results[i][0].transcript+' '; } gotAny=true; if(out)out.textContent='👂 聽到：'+(text.trim()||'(空)'); };
  r.onerror=function(e){ if(out)out.textContent='🔴 辨識問題：'+(e.error||'未知'); };
  r.onend=function(){ if(!stopped){ setTimeout(function(){ try{r.start();}catch(_){}} ,120); return; } if(start)start.disabled=false; if(stop)stop.disabled=true; if(!gotAny&&out)out.textContent='⏹ 沒收到字，再按一次「開始念」。'; cb(text.trim()); };
  if(start)start.disabled=true;
  if(stop){ stop.disabled=false; stop.onclick=function(){ stopped=true; try{r.stop();}catch(_){} setTimeout(function(){ try{r.abort();}catch(_){}} ,1200); }; }
  try{ window.speechSynthesis.cancel(); }catch(_){}
  if(out)out.textContent='🎙 啟動中…';
  setTimeout(function(){ try{ r.start(); }catch(e){ if(start)start.disabled=false; if(stop)stop.disabled=true; if(out)out.textContent='請再按一次「開始念」。'; } },350);
}

/* ===== 闖關架構 ===== */
var STAGES=[
  {key:"dialog", icon:"💬", title:"對話跟讀", sub:"聽 Sam 和 Ann 說話，再跟著唸"},
  {key:"vocab",  icon:"🔤", title:"單字跟讀", sub:"10 個招呼語，每個念念看"},
  {key:"match",  icon:"🎯", title:"連連看",   sub:"聽招呼語，點對的中文"},
  {key:"talk",   icon:"🗣️", title:"對話配對", sub:"別人說一句，選對的回答"},
  {key:"check",  icon:"✅", title:"對錯偵探", sub:"句子對的圈、錯的叉"},
  {key:"stem",   icon:"🔬", title:"STEM 闖關", sub:"科學家動作＋數名字長度"},
];
function starStr(n){ var s='';for(var i=0;i<5;i++)s+=i<n?'⭐':'☆'; return s; }
function markCleared(key,msg){
  if(cleared[key]) return;
  cleared[key]=true; lsSet("teamms-diamond-l1-cleared",cleared);
  notifyOnce(key,msg); renderDots(); markStageUI(key); checkAllDone();
}
function markStageUI(key){
  var st=document.getElementById('stage-'+key); if(!st) return;
  st.classList.toggle('cleared',!!cleared[key]);
  var b=document.getElementById('badge-'+key); if(b) b.textContent=cleared[key]?'✅ 過關':'';
}
function checkAllDone(){
  var all=STAGES.every(function(s){return cleared[s.key];});
  document.getElementById('banner').classList.toggle('show',all);
  if(all) notifyOnce('all','🎉 小鑽石把 Lesson 1 複習 6 關全部闖關成功了！👏✨');
}
function renderDots(){
  document.getElementById('dots').innerHTML=STAGES.map(function(s){
    return '<div class="dot'+(cleared[s.key]?' done':'')+'" onclick="goStage(\''+s.key+'\')">'
      +'<div class="bubble">'+(cleared[s.key]?'✓':s.icon)+'</div><div class="lbl">'+s.title+'</div></div>';
  }).join('');
}
function goStage(key){ var el=document.getElementById('stage-'+key); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

/* ---- 建立所有關卡外框 ---- */
function buildShell(){
  document.getElementById('stages').innerHTML=STAGES.map(function(s){
    return '<section class="stage'+(cleared[s.key]?' cleared':'')+'" id="stage-'+s.key+'">'
      +'<div class="stage-head"><span class="stage-icon">'+s.icon+'</span><span class="stage-title">'+s.title+'</span>'
      +'<span class="stage-badge" id="badge-'+s.key+'">'+(cleared[s.key]?'✅ 過關':'')+'</span></div>'
      +'<p class="stage-sub">'+s.sub+'</p><div id="body-'+s.key+'"></div></section>';
  }).join('');
}

/* ===== 關卡 1：對話跟讀 ===== */
function buildDialog(){
  var html='';
  dialogueLines.forEach(function(l,i){
    var id='d'+i;
    html+='<div class="card"><div class="who">'+l.speaker+'</div><div class="en">'+l.text+'</div><div class="zh">'+l.zh+'</div>'
      +'<div class="row">'
      +'<button class="act listen" onclick="speak('+js(l.text)+',\''+l.role+'\')">🔊 聽</button>'
      +'<button class="act start" id="'+id+'-start" onclick="recLine('+i+')">🎤 開始念</button>'
      +'<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button></div>'
      +'<div class="out" id="'+id+'-out"></div><div class="stars" id="'+id+'-stars">'+starStr(scores[i]||0)+'</div></div>';
  });
  document.getElementById('body-dialog').innerHTML=html;
}
function recLine(i){
  rec('d'+i,function(heard){
    if(!heard)return;
    var s=scoreSpeech(dialogueLines[i].text,heard).stars;
    scores[i]=Math.max(scores[i]||0,s); lsSet("teamms-diamond-l1-scores",scores);
    document.getElementById('d'+i+'-stars').textContent=starStr(s);
    document.getElementById('d'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
    if(dialogueLines.every(function(_,k){return (scores[k]||0)>=3;})) markCleared('dialog','💬 小鑽石 對話跟讀全部 3 星以上過關！');
  });
}

/* ===== 關卡 2：單字跟讀 ===== */
function buildVocab(){
  var html='';
  vocab.forEach(function(w,i){
    var id='v'+i;
    html+='<div class="card"><div class="en">'+w.emo+' '+w.word+' <span class="kk">'+w.kk+'</span></div><div class="zh">'+w.zh+'</div>'
      +'<div class="row">'
      +'<button class="act listen" onclick="speak('+js(w.word)+',\'together\')">🔊 聽</button>'
      +'<button class="act start" id="'+id+'-start" onclick="recVocab('+i+')">🎤 開始念</button>'
      +'<button class="act stop" id="'+id+'-stop" disabled>⏹ 念好了</button></div>'
      +'<div class="out" id="'+id+'-out"></div><div class="stars" id="'+id+'-stars">'+starStr(vScores[i]||0)+'</div></div>';
  });
  document.getElementById('body-vocab').innerHTML=html;
}
function recVocab(i){
  rec('v'+i,function(heard){
    if(!heard)return;
    var s=scoreSpeech(vocab[i].word,heard).stars;
    vScores[i]=Math.max(vScores[i]||0,s); lsSet("teamms-diamond-l1-vocab",vScores);
    document.getElementById('v'+i+'-stars').textContent=starStr(s);
    document.getElementById('v'+i+'-out').textContent='👂 '+heard+'　→　'+s+' 顆星';
    if(vocab.every(function(_,k){return (vScores[k]||0)>=3;})) markCleared('vocab','🔤 小鑽石 10 個招呼語跟讀全部過關！');
  });
}

/* ===== 共用 ===== */
function js(x){ return JSON.stringify(x).replace(/"/g,'&quot;'); }
function shuffle(a){ a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }

/* ===== 關卡 3：連連看（聽招呼語→點中文） ===== */
var mgOrder=[],mgPos=0,mgScore=0;
function mgStart(){ mgOrder=shuffle(vocab.map(function(_,i){return i;})); mgPos=0; mgScore=0; mgRender(); }
function mgRender(){
  var p=document.getElementById('body-match');
  if(mgPos>=mgOrder.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 連連看全對！</div><div class="zh">答對 '+mgScore+' / '+mgOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="mgStart()">再玩一次</button></div></div>';
    markCleared('match','🎯 小鑽石 完成連連看！答對 '+mgScore+' / '+mgOrder.length); return;
  }
  var t=mgOrder[mgPos];
  var opts=shuffle([t].concat(shuffle(vocab.map(function(_,i){return i;}).filter(function(i){return i!==t;})).slice(0,3)));
  var h='<div class="card" style="text-align:center"><div class="zh">第 '+(mgPos+1)+' / '+mgOrder.length+' 題　答對 '+mgScore+'</div>'
    +'<div class="big" style="font-size:40px">👂</div>'
    +'<div class="en">聽一聽，這是哪個字？</div>'
    +'<div class="row" style="justify-content:center"><button class="act listen" onclick="speak('+js(vocab[t].word)+',\'together\')">🔊 再聽一次</button></div>'
    +'<div class="game-grid">';
  opts.forEach(function(i){ h+='<button class="opt gem" onclick="mgPick('+i+','+t+')">'+vocab[i].word+'</button>'; });
  h+='</div><div class="out" id="mg-out"></div></div>';
  p.innerHTML=h;
  setTimeout(function(){ speak(vocab[t].word,'together'); },250);
}
function mgPick(i,t){
  var out=document.getElementById('mg-out');
  if(i===t){ mgScore++; out.textContent='✅ 答對了！'+vocab[t].word+'（'+vocab[t].zh+'）'; mgPos++; speak(vocab[t].word,'together',mgRender); }
  else{ out.textContent='❌ 答錯了，你點的是「'+vocab[i].word+'」，再聽聽看 🙂'; speak(vocab[t].word,'together'); }
}

/* ===== 關卡 4：對話配對 ===== */
var tgOrder=[],tgPos=0,tgScore=0;
function tgStart(){ tgOrder=shuffle(talkPairs.map(function(_,i){return i;})); tgPos=0; tgScore=0; tgRender(); }
function tgRender(){
  var p=document.getElementById('body-talk');
  if(tgPos>=tgOrder.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 對話配對全對！</div><div class="zh">答對 '+tgScore+' / '+tgOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="tgStart()">再玩一次</button></div></div>';
    markCleared('talk','🗣️ 小鑽石 完成對話配對！答對 '+tgScore+' / '+tgOrder.length); return;
  }
  var pair=talkPairs[tgOrder[tgPos]];
  var opts=shuffle([pair.a].concat(pair.d));
  var h='<div class="card"><div class="zh" style="text-align:center">第 '+(tgPos+1)+' / '+tgOrder.length+' 題　答對 '+tgScore+'</div>'
    +'<div class="en" style="text-align:center">'+pair.q+'</div>'
    +'<div class="row" style="justify-content:center"><button class="act listen" onclick="speak('+js(pair.q)+',\'sam\')">🔊 再聽一次</button></div>'
    +'<div class="zh" style="text-align:center;margin:8px 0">該怎麼回答？👇</div>';
  opts.forEach(function(o){ h+='<button class="opt wide" onclick="tgPick('+js(o)+','+js(pair.a)+','+js(pair.q)+')">'+o+'</button>'; });
  h+='<div class="out" id="tg-out"></div></div>';
  p.innerHTML=h;
  setTimeout(function(){ speak(pair.q,'sam'); },250);
}
function tgPick(picked,answer,q){
  var out=document.getElementById('tg-out');
  if(picked===answer){ tgScore++; out.textContent='✅ 答對了！'; tgPos++; speak(answer,'ann',tgRender); }
  else{ out.textContent='❌ 答錯了，你選的是「'+picked+'」，再試試看 🙂'; speak(picked,'ann',function(){ speak(q,'sam'); }); }
}

/* ===== 關卡 5：對錯偵探（O/X） ===== */
var ckOrder=[],ckPos=0,ckScore=0;
function ckStart(){ ckOrder=shuffle(checkItems.map(function(_,i){return i;})); ckPos=0; ckScore=0; ckRender(); }
function ckRender(){
  var p=document.getElementById('body-check');
  if(ckPos>=ckOrder.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 偵探任務完成！</div><div class="zh">答對 '+ckScore+' / '+ckOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="ckStart()">再玩一次</button></div></div>';
    markCleared('check','✅ 小鑽石 完成對錯偵探！答對 '+ckScore+' / '+ckOrder.length); return;
  }
  var it=checkItems[ckOrder[ckPos]];
  var h='<div class="card" style="text-align:center"><div class="zh">第 '+(ckPos+1)+' / '+ckOrder.length+' 題　答對 '+ckScore+'</div>'
    +'<div class="en">「'+it.text+'」</div><div class="zh">這句寫得對嗎？</div>'
    +'<div class="row" style="justify-content:center;margin-top:6px">'
    +'<button class="opt" id="ck-yes" onclick="ckPick(true)">⭕ 對</button>'
    +'<button class="opt gem" id="ck-no" onclick="ckPick(false)">❌ 錯</button></div>'
    +'<div class="reveal" id="ck-reveal"></div>'
    +'<button class="next" id="ck-next" style="display:none" onclick="ckNext()">下一題 →</button></div>';
  p.innerHTML=h;
}
function ckEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function ckHL(text,tok,cls){ var i=text.indexOf(tok); if(i<0) return ckEsc(text); return ckEsc(text.slice(0,i))+'<span class="'+cls+'">'+ckEsc(tok)+'</span>'+ckEsc(text.slice(i+tok.length)); }
function ckPick(saysOk){
  var it=checkItems[ckOrder[ckPos]];
  var correct=(saysOk===it.ok);
  if(correct) ckScore++;
  var y=document.getElementById('ck-yes'), n=document.getElementById('ck-no');
  if(y) y.disabled=true; if(n) n.disabled=true;
  var html=correct?'<div style="color:var(--green);font-weight:900;font-size:18px">✅ 答對了！</div>'
                  :'<div style="color:#e11d48;font-weight:900;font-size:18px">❌ 答錯了，看看正確答案</div>';
  if(it.ok){
    html+='<div class="reveal">這句寫得<b>對</b> 👍<br><span class="sent">'+ckEsc(it.text)+'</span></div>';
  }else{
    html+='<div class="reveal">這句<b>錯</b>了！錯在紅色的地方 👇<br>'
      +'<span class="sent">'+ckHL(it.text,it.bad,'err')+'</span>'
      +'<br>✏️ 正確要寫成：<br><span class="sent">'+ckHL(it.correct,it.fixTok,'fixh')+'</span>'
      +'<br><small style="color:var(--muted)">'+it.fix+'</small></div>';
  }
  document.getElementById('ck-reveal').innerHTML=html;
  document.getElementById('ck-next').style.display='inline-flex';
}
function ckNext(){
  ckPos++;
  if(ckPos>=ckOrder.length){
    document.getElementById('body-check').innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 偵探任務完成！</div><div class="zh">答對 '+ckScore+' / '+ckOrder.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="ckStart()">再玩一次</button></div></div>';
    markCleared('check','✅ 小鑽石 完成對錯偵探！答對 '+ckScore+' / '+ckOrder.length); return;
  }
  ckRender();
}

/* ===== 關卡 6：STEM（科學家動作聽音選字 → 數名字長度） ===== */
var stPhase=0,sgOrder=[],sgPos=0,sgScore=0,nqPos=0,nqScore=0;
function stStart(){ stPhase=0; sgOrder=shuffle(stemWords.map(function(_,i){return i;})); sgPos=0; sgScore=0; nqPos=0; nqScore=0; stRender(); }
function stRender(){
  var p=document.getElementById('body-stem');
  if(stPhase===0){
    if(sgPos>=sgOrder.length){ stPhase=1; stRender(); return; }
    var t=sgOrder[sgPos];
    var h='<div class="card" style="text-align:center"><div class="zh">🔬 科學家動作　第 '+(sgPos+1)+' / '+sgOrder.length+' 個</div>'
      +'<div class="big" style="font-size:40px">👂</div>'
      +'<div class="en">聽一聽，這是哪個動作？</div>'
      +'<div class="row" style="justify-content:center"><button class="act listen" onclick="speak('+js(stemWords[t].word)+',\'together\')">🔊 再聽一次</button></div>'
      +'<div class="game-grid">';
    shuffle(stemWords.map(function(_,i){return i;})).forEach(function(i){ h+='<button class="opt gem" onclick="sgPick('+i+','+t+')">'+stemWords[i].word+'</button>'; });
    h+='</div><div class="out" id="sg-out"></div></div>';
    p.innerHTML=h;
    setTimeout(function(){ speak(stemWords[t].word,'together'); },250);
    return;
  }
  // phase 1：數名字長度
  if(nqPos>=nameQuiz.length){
    p.innerHTML='<div class="card" style="text-align:center"><div class="big">🎉 STEM 全部過關！</div><div class="zh">科學家動作 '+sgScore+'/'+sgOrder.length+'　名字長度 '+nqScore+'/'+nameQuiz.length+'</div><div class="row" style="justify-content:center"><button class="act start" onclick="stStart()">再玩一次</button></div></div>';
    markCleared('stem','🔬 小鑽石 完成 STEM 闖關！科學家動作＋數名字長度都過關 🧪'); return;
  }
  var q=nameQuiz[nqPos];
  var h='<div class="card" style="text-align:center"><div class="zh">📏 數一數名字　第 '+(nqPos+1)+' / '+nameQuiz.length+' 題</div>'
    +'<div class="en">'+q.ask+'</div><div class="game-grid">';
  shuffle(q.names).forEach(function(n){ h+='<button class="opt" onclick="nqPick('+js(n)+')">'+n+'<br><small>'+n.length+' 個字母</small></button>'; });
  h+='</div><div class="out" id="nq-out"></div></div>';
  p.innerHTML=h;
}
function sgPick(i,t){
  var out=document.getElementById('sg-out');
  if(i===t){ sgScore++; out.textContent='✅ 答對了！'+stemWords[t].word+' = '+stemWords[t].zh; sgPos++; speak(stemWords[t].word,'together',stRender); }
  else{ out.textContent='❌ 答錯了，你選的是「'+stemWords[i].word+'」。提示：'+stemWords[t].desc+'　再聽一次選選看 🙂'; speak(stemWords[t].word,'together'); }
}
function nqPick(name){
  var q=nameQuiz[nqPos], out=document.getElementById('nq-out');
  if(name===q.answer){ nqScore++; out.textContent='✅ 答對了！'+q.answer+' 有 '+q.answer.length+' 個字母'; nqPos++; setTimeout(stRender,1100); }
  else{ out.textContent='❌ 再數數看～「'+name+'」有 '+name.length+' 個字母'; }
}

/* ===== 啟動 ===== */
buildShell();
buildDialog();
buildVocab();
mgStart(); tgStart(); ckStart(); stStart();
renderDots();
STAGES.forEach(function(s){ markStageUI(s.key); });
checkAllDone();
if(window.speechSynthesis) speechSynthesis.getVoices();
</script>
